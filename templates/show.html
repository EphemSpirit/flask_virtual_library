<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <p>Book name: {{ book.title }}</p>
    <p>Current Rating {{ book.rating }}</p>
    <form action="{{ url_for('edit_book', id=book.id) }}" method="post">
        <input type="text" name="rating" />
        <button type="submit">Change Rating</button>
    </form>
</body>
</html>
